<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toastid Tech \u2014 YouTube Agency Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1a3260;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #7a6030;
    --white: #f4f1ea;
    --muted: #8899b4;
    --accent: #4a90d9;
    --red: #e05a5a;
    --green: #5ab88a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 80%, rgba(74,144,217,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* HEADER */
  header {
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 28px 0 20px;
    margin-bottom: 36px;
  }

  .header-inner {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo-block {}
  .logo-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--white);
  }

  h1 span { color: var(--gold); }

  .header-meta {
    text-align: right;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    margin-bottom: 6px;
  }

  .header-meta p {
    font-size: 12px;
    color: var(--muted);
  }

  /* PHASE TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--gold-light); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* PANELS */
  .panel { display: none; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .section-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* CARDS */
  .card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 8px;
  }

  .card h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 6px;
  }

  .card p, .card li {
    font-size: 13px;
    color: #aab8cc;
    line-height: 1.65;
  }

  .card ul { padding-left: 16px; margin-top: 6px; }
  .card li { margin-bottom: 4px; }

  /* GRID */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 580px) { .grid-2 { grid-template-columns: 1fr; } }

  /* PILLAR BLOCKS */
  .pillars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) { .pillars { grid-template-columns: 1fr; } }

  .pillar {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
  }

  .pillar-icon {
    font-size: 24px;
    margin-bottom: 8px;
  }

  .pillar h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--gold-light);
    margin-bottom: 4px;
  }

  .pillar p {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* CALENDAR */
  .week-block {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 6px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .week-header {
    background: var(--navy-light);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border: none;
    width: 100%;
    text-align: left;
    color: inherit;
  }

  .week-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    min-width: 60px;
  }

  .week-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    flex: 1;
  }
